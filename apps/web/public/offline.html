<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sem conexão</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #faf7f0;
        color: #18160f;
        text-align: center;
        padding: 24px;
      }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      p { color: #6b6455; max-width: 28ch; }
      button {
        margin-top: 16px;
        border: 0;
        border-radius: 12px;
        background: #e8560a;
        color: #fff;
        font-weight: 800;
        padding: 12px 24px;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Você está offline</h1>
      <p>Sem conexão no momento. Verifique sua internet e tente de novo.</p>
      <button onclick="location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>

# Deploy workflow — builda imagens Docker, pusha para GHCR, e faz deploy na EC2.
# Roda após o CI verde no push para master/main. O deploy-ship local (scripts/)
# continua funcionando como fallback — este workflow automatiza o mesmo fluxo.

name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch: # permite deploy manual pelo GitHub UI

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # não cancela deploys em andamento

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/obracerta-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/obracerta-web

jobs:
  # ── 1. Verificação (mesmo do CI — garante que não publicamos algo quebrado) ──
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # ── 2. Build e push das imagens Docker para GHCR ──
  build-images:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: infra/docker/Dockerfile.api
          - name: web
            dockerfile: infra/docker/Dockerfile.web
    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/obracerta-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy na EC2 via AWS SSM (sem abrir a porta 22 no security group) ──
  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write # OIDC: assume a role da AWS sem chave de longa duração
      contents: read
    steps:
      - name: Configura credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy na EC2 via SSM Run Command
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          API_TAG: ${{ env.API_IMAGE }}:latest
          WEB_TAG: ${{ env.WEB_IMAGE }}:latest
        run: |
          set -euo pipefail
          # O SSM roda como root; runuser executa o deploy como ec2-user (dono do
          # repo e do docker). git pull traz o remote-deploy.sh atualizado e o script
          # puxa as imagens do GHCR + sobe o stack sem buildar.
          REMOTE="cd ~/obracerta && git fetch origin master -q && git reset --hard FETCH_HEAD && GHCR_API_IMAGE='$API_TAG' GHCR_WEB_IMAGE='$WEB_TAG' bash infra/deploy/remote-deploy.sh"
          CMD="runuser -l ec2-user -c \"$REMOTE\""
          jq -n --arg c "$CMD" '{commands:[$c]}' > ssm-params.json

          echo "▶ Enviando comando SSM para $INSTANCE_ID…"
          CID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${GITHUB_SHA::7}" \
            --parameters file://ssm-params.json \
            --query Command.CommandId --output text)
          echo "CommandId=$CID"

          echo "▶ Aguardando conclusão (até ~12min)…"
          OK=0
          for i in $(seq 1 72); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || echo Pending)
            echo "  [$i] status=$STATUS"
            case "$STATUS" in
              Success) OK=1; break ;;
              Failed|Cancelled|TimedOut)
                echo "::group::stderr do comando remoto"
                aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
                echo "::endgroup::"
                echo "::error::SSM terminou com status $STATUS"; exit 1 ;;
            esac
            sleep 10
          done

          echo "::group::Saída do deploy"
          aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
          echo "::endgroup::"
          [ "$OK" = "1" ] || { echo "::error::timeout aguardando o SSM"; exit 1; }

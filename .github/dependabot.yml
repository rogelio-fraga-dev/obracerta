# Varredura de dependências (roadmap §9 — segurança), com ruído mínimo:
# TUDO agrupado num PR mensal por ecossistema (major separado, que pode quebrar).
# Alertas de segurança continuam imediatos — o Dependabot ignora o schedule p/ CVEs.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      deps-minor-e-patch:
        update-types:
          - "minor"
          - "patch"
      deps-major:
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - "*"
